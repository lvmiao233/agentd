# CI Gates Workflow
# 
# This workflow defines the hard gates for CI/CD.
# Each job represents a required checkpoint before merge.
#
# Phase Gates (placeholder comments for future T4+ implementation):
#   - build-gate: Cargo workspace build (T4)
#   - test-gate: Unit/integration tests (T4)
#   - security-gate: Security scanning (T4)
#   - gate-syscall: System call validation (T4)
#   - gate-isolation: cgroup/namespace isolation (T4)
#
# Evidence Artifacts:
#   - All jobs upload evidence to .sisyphus/evidence/
#   - Structure: .sisyphus/evidence/{job-name}/
#   - Local CI can be validated via scripts/gate-check.sh

name: CI Gates

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Gate 0: Pre-flight Checks
  # ============================================================
  preflight:
    name: Preflight Check
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check required files exist
        id: check
        run: |
          echo "Checking required baseline files..."
          required_files=(
            "rust-toolchain.toml"
            "pyproject.toml"
            "scripts/no-go-guard.sh"
          )
          missing=0
          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              missing=1
            fi
          done
          if [ $missing -eq 0 ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
            echo "All required baseline files present"
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-preflight
          path: .sisyphus/evidence/
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================
  # Gate 1: No-Go Guard (T1/T2 Baseline)
  # ============================================================
  no-go-guard:
    name: No-Go Guard
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.ready == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run No-Go Guard
        run: |
          bash scripts/no-go-guard.sh

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-no-go-guard
          path: .sisyphus/evidence/
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================
  # Gate 2: Build Gate (Placeholder - T4 Implementation)
  # ============================================================
  build-gate:
    name: Build Gate
    runs-on: ubuntu-latest
    needs: no-go-guard
    # Placeholder: implement in T4
    # - Cargo workspace build
    # - Cross-compilation checks
    # - Feature flag validation
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          version: 1.85.0

      - name: Placeholder build check
        run: |
          echo "BUILD GATE PLACEHOLDER"
          echo "This gate will be implemented in T4"
          echo "Expected: cargo build --workspace"
          # TODO: Implement actual build in T4
          # For now, always pass if rust-toolchain.toml exists
          if [ -f rust-toolchain.toml ]; then
            echo "Rust toolchain configured - build gate passes (placeholder)"
            exit 0
          fi
          exit 1

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-build-gate
          path: .sisyphus/evidence/
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================
  # Gate 3: Test Gate (Placeholder - T4 Implementation)
  # ============================================================
  test-gate:
    name: Test Gate
    runs-on: ubuntu-latest
    needs: build-gate
    # Placeholder: implement in T4
