      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-gate-syscall
          path: .sisyphus/evidence/
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================
  # Gate 6: Isolation Gate (Ubuntu 25.10 - Self-Hosted)
  # ============================================================
  gate-isolation:
    name: Isolation Gate (Ubuntu 25.10)
    # Uses self-hosted runner with Ubuntu 25.10 label
    # Required for systemd/cgroup v2 validation
    runs-on: self-hosted-ubuntu-25.10
    needs: gate-syscall
    # Placeholder: implement in T4
    # - cgroup v2 validation
    # - namespace isolation
    # - systemd integration
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Ubuntu version
        run: |
          . /etc/os-release
          echo "Running on $PRETTY_NAME"
          if [ "$VERSION_ID" != "25.10" ]; then
            echo "WARNING: Expected Ubuntu 25.10, got $VERSION_ID"
          fi

      - name: Check cgroup v2
        run: |
          if [ -f /sys/fs/cgroup/cgroup.controllers ]; then
            echo "cgroup v2 detected"
          else
            echo "WARNING: cgroup v2 not detected"
          fi

      - name: Check systemd
        run: |
          if command -v systemctl &> /dev/null; then
            systemctl --version | head -1
          else
            echo "WARNING: systemd not available"
          fi

      - name: Placeholder isolation check
        run: |
          echo "ISOLATION GATE PLACEHOLDER"
          echo "This gate will be implemented in T4"
          echo "Expected: cgroup v2 + systemd integration"
          # TODO: Implement actual isolation validation in T4
          echo "Isolation gate passes (placeholder)"

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-gate-isolation
          path: .sisyphus/evidence/
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================
  # Gate 7: Final Required Check
  # ============================================================
  required-check:
    name: Required Check
    runs-on: ubuntu-latest
    needs: gate-isolation
    if: always()
    steps:
      - name: Verify all gates passed
        run: |
          echo "=== CI Gates Summary ==="
          echo "Preflight: ${{ needs.preflight.result }}"
          echo "No-Go Guard: ${{ needs.no-go-guard.result }}"
          echo "Build Gate: ${{ needs.build-gate.result }}"
          echo "Test Gate: ${{ needs.test-gate.result }}"
          echo "Security Gate: ${{ needs.security-gate.result }}"
          echo "Syscall Gate: ${{ needs.gate-syscall.result }}"
          echo "Isolation Gate: ${{ needs.gate-isolation.result }}"
          
          # Fail if any required gate failed
          if [ "${{ needs.preflight.result }}" != "success" ]; then
            echo "FAILED: Preflight check failed"
            exit 1
          fi
          if [ "${{ needs.no-go-guard.result }}" != "success" ]; then
            echo "FAILED: No-Go Guard failed"
            exit 1
          fi
          # Build, test, security, syscall, isolation are placeholders
          # They pass if previous gates passed (for T3 skeleton)
          echo "All required gates passed!"

      - name: Upload all evidence
        uses: actions/upload-artifact@v4
        with:
          name: evidence-all
          path: .sisyphus/evidence/
          retention-days: 30
          if-no-files-found: ignore
