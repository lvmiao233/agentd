# CI Gates Workflow
# 
# This workflow defines the hard gates for CI/CD.
# Each job represents a required checkpoint before merge.
#
# Phase Gates (placeholder comments for future T4+ implementation):
#   - build-gate: Cargo workspace build (T4)
#   - test-gate: Unit/integration tests (T4)
#   - security-gate: Security scanning (T4)
#   - gate-syscall: System call validation (T4)
#   - gate-isolation: cgroup/namespace isolation (T4)
#
# Evidence Artifacts:
#   - All jobs upload evidence to .sisyphus/evidence/
#   - Structure: .sisyphus/evidence/{job-name}/
#   - Local CI can be validated via scripts/gate-check.sh

name: CI Gates

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Gate 0: Pre-flight Checks
  # ============================================================
  preflight:
    name: Preflight Check
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check required files exist
        id: check
        run: |
          echo "Checking required baseline files..."
          required_files=(
            "rust-toolchain.toml"
            "pyproject.toml"
          )
          missing=0
          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              missing=1
            fi
          done
          if [ $missing -eq 0 ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
            echo "All required baseline files present"
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-preflight
          path: .sisyphus/evidence/
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================
  # Gate 2: Build Gate (Placeholder - T4 Implementation)
  # ============================================================
  build-gate:
    name: Build Gate
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.ready == 'true'
    # - Cargo workspace build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build workspace
        run: |
          cargo metadata --no-deps >/tmp/cargo-metadata.json
          cargo build --workspace

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-build-gate
          path: .sisyphus/evidence/
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================
  # Gate 3: Test Gate (Placeholder - T4 Implementation)
  # ============================================================
  test-gate:
    name: Test Gate
    runs-on: ubuntu-latest
    needs: build-gate
    # - Unit tests
    # - Integration tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run workspace tests
        run: |
          cargo test --workspace

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-test-gate
          path: .sisyphus/evidence/
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================
  # Gate 4: Security Gate (Placeholder - T4 Implementation)
  # ============================================================
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: test-gate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run security baseline checks
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-security-gate
          path: .sisyphus/evidence/
          retention-days: 30
          if-no-files-found: ignore

  phase-a-gate:
    name: Phase A Gate
    runs-on: ubuntu-latest
    needs: security-gate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Phase A gate
        run: |
          bash scripts/gates/phase-a-gate.sh

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-phase-a-gate
          path: .sisyphus/evidence/
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================
  # Gate 5: System Call Gate (Placeholder - T4 Implementation)
  # ============================================================
  gate-syscall:
    name: System Call Gate
    runs-on: ubuntu-latest
    needs: phase-a-gate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate syscall/isolation baseline artifacts
        run: |
          uname -a
          if ! command -v unshare >/dev/null 2>&1; then
            echo "unshare command is required for namespace baseline"
            exit 1
          fi
          unshare --version | head -1
          echo "System-call baseline runtime check passed"

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-gate-syscall
          path: .sisyphus/evidence/
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================
  # Gate 6: Isolation Gate (Ubuntu 25.10 - Self-Hosted)
  # ============================================================
  gate-isolation:
    name: Isolation Gate (Ubuntu 25.10)
    runs-on: ubuntu-latest
    needs: gate-syscall
    # - cgroup v2 validation
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Ubuntu version
        run: |
          . /etc/os-release
          echo "Running on $PRETTY_NAME"
          echo "VERSION_ID=$VERSION_ID"

      - name: Check cgroup v2
        run: |
          if [ -f /sys/fs/cgroup/cgroup.controllers ]; then
            echo "cgroup v2 detected"
          else
            echo "cgroup v2 not detected"
            exit 1
          fi

      - name: Check systemd
        run: |
          if command -v systemctl &> /dev/null; then
            systemctl --version | head -1
          else
            echo "systemd not available"
            exit 1
          fi

      - name: Check namespace tooling
        run: |
          if ! command -v unshare &> /dev/null; then
            echo "unshare command is required for namespace validation"
            exit 1
          fi
          unshare --version | head -1
          echo "Isolation runtime checks passed"

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-gate-isolation
          path: .sisyphus/evidence/
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================
  # Gate 7: Final Required Check
  # ============================================================
  required-check:
    name: Required Check
    runs-on: ubuntu-latest
    needs:
      - preflight
      - build-gate
      - test-gate
      - security-gate
      - phase-a-gate
      - gate-syscall
      - gate-isolation
    if: always()
    steps:
      - name: Verify all gates passed
        run: |
          echo "=== CI Gates Summary ==="
          echo "Preflight: ${{ needs.preflight.result }}"
          echo "Build Gate: ${{ needs.build-gate.result }}"
          echo "Test Gate: ${{ needs.test-gate.result }}"
          echo "Security Gate: ${{ needs.security-gate.result }}"
          echo "Phase A Gate: ${{ needs.phase-a-gate.result }}"
          echo "Syscall Gate: ${{ needs.gate-syscall.result }}"
          echo "Isolation Gate: ${{ needs.gate-isolation.result }}"
           
          # Fail if any required gate failed
          if [ "${{ needs.preflight.result }}" != "success" ]; then
            echo "FAILED: Preflight check failed"
            exit 1
          fi
          if [ "${{ needs.build-gate.result }}" != "success" ]; then
            echo "FAILED: Build Gate failed"
            exit 1
          fi
          if [ "${{ needs.test-gate.result }}" != "success" ]; then
            echo "FAILED: Test Gate failed"
            exit 1
          fi
          if [ "${{ needs.security-gate.result }}" != "success" ]; then
            echo "FAILED: Security Gate failed"
            exit 1
          fi
          if [ "${{ needs.phase-a-gate.result }}" != "success" ]; then
            echo "FAILED: Phase A Gate failed"
            exit 1
          fi
          if [ "${{ needs.gate-syscall.result }}" != "success" ]; then
            echo "FAILED: Syscall Gate failed"
            exit 1
          fi
          if [ "${{ needs.gate-isolation.result }}" != "success" ]; then
            echo "FAILED: Isolation Gate failed"
            exit 1
          fi
          echo "All required gates passed!"

      - name: Upload all evidence
        uses: actions/upload-artifact@v4
        with:
          name: evidence-all
          path: .sisyphus/evidence/
          retention-days: 30
          if-no-files-found: ignore
